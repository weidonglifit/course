<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="微動身活位於新竹市北區，提供最舒適的共享舞蹈空間、即時課表查詢、線上報名系統。內建智慧 AI 櫃檯秘書">
  <meta name="keywords" content="微動身活, 新竹舞蹈教室, 新竹租教室, 北區舞蹈空間, 舞蹈課表, 共享舞室">
  
  <meta property="og:title" content="微動身活 | 共享舞蹈空間">
  <meta property="og:image" content="https://lh3.googleusercontent.com/u/0/d/1kmiYWPJWXkED7Fhyo6fVmBz7HXqMUAY7">
  <meta property="og:type" content="website">
    <title>微動身活</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
   <script>
        // 1. 淨化網域 (移除 FB/IG 追蹤碼)
        if (location.search.indexOf('fbclid') !== -1 || location.search.indexOf('paverf') !== -1) {
            var cleanUrl = location.protocol + '//' + location.host + location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }

        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isInstagram = /Instagram/.test(ua);
       var isFacebook = /FBAN|FBAV/.test(ua);
        // 偵測螢幕寬度，通常手機小於 768px
        var isMobileWidth = window.innerWidth <= 768; 
        var gasUrl = "https://script.google.com/macros/s/AKfycbzMsKpq2PiUuvvHF_lZhIRIA4KnRC553LFVFLcDPZqD1CArDjBtyjyZeu5kKeg31SM/exec";

        if (isInstagram || isFacebook) {
            // IG 環境：絕對不載入 Google，避免噴出 UNDEFINED
            document.body.style.cssText = "padding:40px 24px; text-align:center; font-family:sans-serif; background:#ffffff; color:#333; line-height:1.6;";

            document.body.innerHTML = `
                <div style="max-width:400px; margin:0 auto; background:white; padding:30px 20px; border-radius:16px; box-shadow:0 4px 20px rgba(232,122,144,0.15); border:1px solid #F4A7B9;">
                    
                    <div style="text-align: center; margin-bottom: 15px;">
                        <img src="https://lh3.googleusercontent.com/u/0/d/1kmiYWPJWXkED7Fhyo6fVmBz7HXqMUAY7" 
                             alt="微動身活" 
                             style="height: 100px; width: auto; vertical-align: middle;">
                    </div>
            
                    <span style="font-size: 36px;">📢</span>
                    <h3 style="color:#D05A6E; margin-top:10px; margin-bottom:20px;">預約系統連線提醒</h3>
                    <p style="font-size:16px; color:#555;">請不要使用社群軟體的內建瀏覽器。</p>
                    <div style="background:#FFF0F2; padding:12px; border-radius:8px; margin:20px 0; font-size:15px; font-weight:bold; color:#e74c3c;">
                        👉 請點擊右上角「● ● ●」<br>並選擇「在瀏覽器中開啟」
                    </div>
                    <small style="color:#bababa;">微動身活管理系統關心您</small>
                </div>
            `;
        } else if (isMobileWidth) {
            // 手機版 Safari/Chrome：直接跳轉 (解決自動展開，避開 iframe 卡死)
            window.location.replace(gasUrl);
        } else {
            // 電腦版：維持原本的 iframe，保證顯示正常
            document.body.innerHTML = '<iframe src="' + gasUrl + '" allow="clipboard-write" style="position:absolute; top:0; left:0; width:100%; height:100%; border:none;"></iframe>';
        }
    </script>
</body>
</html>
