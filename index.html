<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微動身活</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
   <script>
        // 1. 【自動淨化網址】如果發現網址帶有追蹤參數，立即清除並保持乾淨網址
        if (location.search.indexOf('fbclid') !== -1 || location.search.indexOf('paverf') !== -1) {
            var cleanUrl = location.protocol + '//' + location.host + location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }

        // 2. 【環境判斷】
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isInstagram = /Instagram/.test(ua);

        if (isInstagram) {
            // 如果是 IG：顯示引導，不載入 iframe
            document.body.style.padding = "50px 20px";
            document.body.style.textAlign = "center";
            document.body.style.fontFamily = "sans-serif";
            document.body.innerHTML = "<h3>🌸 系統連線提醒</h3>請點擊右上角「● ● ●」，並選擇「在瀏覽器中開啟」以進行預約。";
        } else {
            // 如果不是 IG：載入原本的 iframe
            //window.location.replace(https://script.google.com/macros/s/AKfycbzMsKpq2PiUuvvHF_lZhIRIA4KnRC553LFVFLcDPZqD1CArDjBtyjyZeu5kKeg31SM/exec);
            document.body.innerHTML = '<iframe src="https://script.google.com/macros/s/AKfycbzMsKpq2PiUuvvHF_lZhIRIA4KnRC553LFVFLcDPZqD1CArDjBtyjyZeu5kKeg31SM/exec" style="position:absolute; top:0; left:0; width:100%; height:100%; border:none;"></iframe>';
        }
    </script>
</body>
</html>
